


<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor API REST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white text-center">
                        <h5 class="mb-0">Conversor de Texto via API REST</h5>
                    </div>
                    <div class="card-body">
                        
                        <form id="conversorForm">
                            <div class="mb-3">
                                <label for="textoInput" class="form-label">Digita o teu texto:</label>
                                <input type="text" id="textoInput" class="form-control" placeholder="Ex: olá mundo" required>
                            </div>
                            <button type="submit" class="btn btn-dark w-100">Enviar para a API</button>
                        </form>

                        <div id="resultadoContainer" class="mt-4 alert alert-success d-none text-center">
                            <h6>Resultado da API:</h6>
                            <h3 id="textoResultado" class="fw-bold mb-0"></h3>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('conversorForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Impede o formulário de recarregar a página
            
            const texto = document.getElementById('textoInput').value;
            
            try {
                // Faz a chamada assíncrona para o endpoint do Django
                const response = await fetch('/api/upper/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ texto: texto }) // Envia o JSON com a chave "texto"
                });

                if (response.ok) {
                    const dados = await response.json();
                    
                    // CORREÇÃO: Alvo alterado para 'textoResultado' e chave alterada para 'dados.resultado'
                    document.getElementById('textoResultado').textContent = dados.resultado;
                    document.getElementById('resultadoContainer').classList.remove('d-none');
                } else {
                    alert('Erro ao comunicar com a API. Status: ' + response.status);
                }
            } catch (error) {
                console.error('Erro na requisição:', error);
                alert('Erro de conexão com o servidor.');
            }
        });
    </script>
</body>
</html>
